name: Publish scheduled release

on:
  schedule:
    # 15:00 UTC = 17:00 Helsinki (EET, UTC+2) in winter (Oct–Mar)
    - cron: '0 15 * * *'
  workflow_dispatch:  # allow manual trigger too

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish latest draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent draft release
          DRAFT_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.draft == true)] | sort_by(.created_at) | last | .id')

          if [ -z "$DRAFT_ID" ] || [ "$DRAFT_ID" = "null" ]; then
            echo "No draft release found, nothing to publish."
            exit 0
          fi

          echo "Publishing draft release ID: $DRAFT_ID"
          gh api --method PATCH repos/${{ github.repository }}/releases/$DRAFT_ID \
            --field draft=false \
            --field prerelease=false
          echo "Done."
